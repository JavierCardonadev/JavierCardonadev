<rect x="40" y="382" width="290" height="40" rx="8" fill="#E8F5EA" stroke="#4CAF66"/>
<text class="chip" x="185" y="399" text-anchor="middle" fill="#2E7D43">CI/CD - GitHub Actions</text>
<text class="sub" x="185" y="414" text-anchor="middle">repository_dispatch (deploy automatico)</text>

<line x1="470" y1="364" x2="430" y2="381" stroke="#94A3B8" stroke-width="2" marker-end="url(#ah)"/>
