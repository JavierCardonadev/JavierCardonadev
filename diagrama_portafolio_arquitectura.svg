<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 442" role="img" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<title>Arquitectura del portafolio: microfrontends y microservicios</title>
<desc>Usuario, Cloudflare Tunnel, microfrontends Single SPA, microservicios NestJS, bases de datos y CI/CD.</desc>
<defs>
<marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/></marker>
<style>.h{font-size:14px;font-weight:600}.lbl{font-size:13px;font-weight:600}.sub{font-size:11px;fill:#64748B}.chip{font-size:11px;font-weight:500}.ph{font-size:13px;font-weight:600;fill:#475569}</style>
</defs>

<rect x="250" y="28" width="180" height="42" rx="8" fill="#EEF0F2" stroke="#9AA3AD"/>
